<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalentHire</title>
    <script>
      (function() {
        var theme = localStorage.getItem('talenthire_theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <style>
      html:not(.dark) { color: #111827 !important; background-color: #ffffff !important; }
      html:not(.dark) body { color: #111827 !important; background-color: #ffffff !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
